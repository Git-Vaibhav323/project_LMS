services:
  - type: web
    name: faculty-cms-backend
    runtime: node
    rootDir: backend
    region: singapore
    plan: free

    buildCommand: npm install && npm run build
    startCommand: npx prisma migrate deploy && npm start

    healthCheckPath: /health

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: "7d"
      - key: CLIENT_ORIGIN
        sync: false
      - key: MAX_FILE_SIZE_MB
        value: "10"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_BUCKET
        value: "faculty-files"
      - key: SUPABASE_JWT_SECRET
        sync: false
