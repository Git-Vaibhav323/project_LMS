services:
  postgres:
    image: postgres:16-alpine
    container_name: faculty-cms-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: faculty_cms
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: faculty-cms-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 5000
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/faculty_cms?schema=public
      JWT_SECRET: change-this-in-production-to-a-long-random-string
      JWT_EXPIRES_IN: 7d
      CLIENT_ORIGIN: http://localhost:3000
      UPLOAD_DIR: uploads
      MAX_FILE_SIZE_MB: 10
    ports:
      - "5000:5000"
    volumes:
      - uploads_data:/app/uploads

  frontend:
    build:
      context: ./frontend
    container_name: faculty-cms-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  uploads_data:
